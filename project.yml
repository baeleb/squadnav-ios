name: SilkRoad
options:
  bundleIdPrefix: com.silkroad
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: SilkRoad/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: ""

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  SilkRoad:
    type: application
    platform: iOS
    sources:
      - path: SilkRoad
    resources:
      - path: SilkRoad/Resources/Assets.xcassets
      - path: SilkRoad/Resources/GoogleService-Info.plist
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - sdk: CarPlay.framework
      - sdk: MapKit.framework
      - sdk: CoreLocation.framework
      - sdk: AuthenticationServices.framework
    settings:
      base:
        INFOPLIST_FILE: SilkRoad/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SilkRoad/Resources/SilkRoad.entitlements
        ENTITLEMENTS_REQUIRED: YES
    info:
      path: SilkRoad/Resources/Info.plist
      properties:
        CFBundleDisplayName: Silk Road
        CFBundleName: SilkRoad
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "com.googleusercontent.apps.dummy"
          - CFBundleURLSchemes:
              - "silkroad"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "Silk Road needs your location to navigate and share your position with your caravan."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Silk Road needs background location access to keep tracking your position during navigation."
        UIBackgroundModes:
          - location
          - remote-notification
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).CarPlaySceneDelegate"
    entitlements:
      path: SilkRoad/Resources/SilkRoad.entitlements
      properties:
        com.apple.developer.carplay-maps: true
        com.apple.developer.applesignin: ["Default"]
        aps-environment: development
