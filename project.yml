name: SquadNav
options:
  bundleIdPrefix: com.squadnav
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: ""

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  SquadNav:
    type: application
    platform: iOS
    sources:
      - path: SquadNav
    resources:
      - path: SquadNav/Resources/Assets.xcassets
      - path: SquadNav/Resources/GoogleService-Info.plist
      - path: SquadNav/Resources/Fonts/Fredoka-Medium.ttf
      - path: SquadNav/Resources/Fonts/Fredoka-SemiBold.ttf
      - path: SquadNav/Resources/Fonts/Fredoka-Bold.ttf
      - path: SquadNav/Resources/Fonts/Nunito-Regular.ttf
      - path: SquadNav/Resources/Fonts/Nunito-SemiBold.ttf
      - path: SquadNav/Resources/Fonts/Nunito-Bold.ttf
      - path: SquadNav/Resources/Fonts/Nunito-ExtraBold.ttf
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - sdk: CarPlay.framework
      - sdk: MapKit.framework
      - sdk: CoreLocation.framework
      - sdk: AuthenticationServices.framework
      - target: SquadNavLiveActivity
    settings:
      base:
        INFOPLIST_FILE: SquadNav/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SquadNav/Resources/SquadNav.entitlements
        ENTITLEMENTS_REQUIRED: YES
    info:
      path: SquadNav/Resources/Info.plist
      properties:
        CFBundleDisplayName: SquadNav
        CFBundleName: SquadNav
        NSSupportsLiveActivities: true
        UIAppFonts:
          - Fredoka-Medium.ttf
          - Fredoka-SemiBold.ttf
          - Fredoka-Bold.ttf
          - Nunito-Regular.ttf
          - Nunito-SemiBold.ttf
          - Nunito-Bold.ttf
          - Nunito-ExtraBold.ttf
        # Google Sign-In SDK v8 crashes without GIDClientID in Info.plist
        # (matches CLIENT_ID in GoogleService-Info.plist)
        GIDClientID: "197592495387-d3j3v3cv0r6cj77b9sq90dcer1mvkpg1.apps.googleusercontent.com"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "com.googleusercontent.apps.197592495387-d3j3v3cv0r6cj77b9sq90dcer1mvkpg1"
          - CFBundleURLSchemes:
              - "squadnav"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "SquadNav needs your location to navigate and share your position with your caravan."
        NSLocationAlwaysAndWhenInUseUsageDescription: "SquadNav needs background location access to keep tracking your position during navigation."
        UIBackgroundModes:
          - location
          - remote-notification
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).CarPlaySceneDelegate"
    entitlements:
      path: SquadNav/Resources/SquadNav.entitlements
      properties:
        com.apple.developer.carplay-maps: true
        com.apple.developer.applesignin: ["Default"]
        aps-environment: development

  SquadNavLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: SquadNavLiveActivity
      - path: SquadNav/Utilities/NavigationActivityAttributes.swift
      - path: SquadNav/Utilities/ManeuverIcon.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        INFOPLIST_FILE: SquadNavLiveActivity/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SquadNavLiveActivity/Resources/SquadNavLiveActivity.entitlements
        # App extension bundle IDs must be prefixed by the containing app's
        # bundle ID plus a dot, or simctl/install rejects the embed.
        PRODUCT_BUNDLE_IDENTIFIER: com.squadnav.SquadNav.LiveActivity
    info:
      path: SquadNavLiveActivity/Resources/Info.plist
      properties:
        CFBundleDisplayName: SquadNav Navigation
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: SquadNavLiveActivity/Resources/SquadNavLiveActivity.entitlements
      properties: {}

  SquadNavTests:
    type: bundle.unit-test
    platform: iOS
    # Standalone test target: no dependency on the SquadNav app target, so no
    # TEST_HOST and the AppDelegate/FirebaseApp.configure() never runs.
    # Only the specific app sources under test are compiled into this bundle.
    sources:
      - path: SquadNavTests
      - path: SquadNav/Utilities/RouteEncoder.swift
      - path: SquadNav/Utilities/Extensions.swift
      - path: SquadNav/Models/MemberLocation.swift
      - path: SquadNav/Models/NavigationState.swift
      - path: SquadNav/Models/Group.swift
      - path: SquadNav/Models/Message.swift
      - path: SquadNav/Models/SharedFile.swift
      - path: SquadNav/Models/User.swift
      - path: SquadNav/Services/NavigationService.swift
      - path: SquadNav/Services/CaravanMonitorService.swift
      - path: SquadNav/Services/GroupService.swift
      - path: SquadNav/Services/ChatService.swift
      - path: SquadNav/Services/AuthService.swift
      - path: SquadNav/Services/LocationService.swift
      - path: SquadNav/ViewModels/NavigationViewModel.swift
      - path: SquadNav/Services/LiveActivityService.swift
      - path: SquadNav/Utilities/NavigationActivityAttributes.swift
      - path: SquadNav/Utilities/ManeuverIcon.swift
    resources:
      # Copy in SquadNavTests/ — xcodegen dedupes a path that is also inside
      # the app target's sources, dropping the test target's Resources phase.
      - path: SquadNavTests/GoogleService-Info.plist
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SquadNavTests:
    build:
      targets:
        SquadNavTests: [test]
    test:
      targets:
        - SquadNavTests
